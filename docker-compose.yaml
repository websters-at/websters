services:
  websters:
    container_name: websters
    build:
      context: .
      target: production
    restart: always
    pull_policy: build
    ports:
      - '42069:80'
    volumes:
      - './caddy/data:/data'
      - './caddy/config:/config'
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_HOST=mysql
      - DB_DATABASE=${MYSQL_DATABASE}
      - DB_USERNAME=${MYSQL_USER}
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_PORT=6379
    # Container healthcheck: app responds on :80
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      # --- Router (main domain) ---
      - "traefik.http.routers.${ROUTER_NAME}.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.${ROUTER_NAME}.entrypoints=https"
      - "traefik.http.routers.${ROUTER_NAME}.tls=true"
      - "traefik.http.routers.${ROUTER_NAME}.tls.certresolver=letsencrypt"
      # --- Router (www -> redirect to main) ---
      - "traefik.http.routers.${ROUTER_NAME}-secondary.rule=Host(`${SECONDARY_DOMAIN}`)"
      - "traefik.http.routers.${ROUTER_NAME}-secondary.entrypoints=https"
      - "traefik.http.routers.${ROUTER_NAME}-secondary.tls=true"
      - "traefik.http.routers.${ROUTER_NAME}-secondary.tls.certresolver=letsencrypt"
      - "traefik.http.routers.${ROUTER_NAME}-secondary.middlewares=redirect-to-main"
      # --- Middleware: www -> apex ---
      - "traefik.http.middlewares.redirect-to-main.redirectregex.regex=^https?://${SECONDARY_DOMAIN}/(.*)"
      - "traefik.http.middlewares.redirect-to-main.redirectregex.replacement=https://${DOMAIN}/$$1"
      - "traefik.http.middlewares.redirect-to-main.redirectregex.permanent=true"
      # --- Service + Zero-Downtime: only route to healthy backends ---
      - "traefik.http.services.${ROUTER_NAME}.loadbalancer.server.port=80"
      - "traefik.http.services.${ROUTER_NAME}.loadbalancer.healthcheck.path=/"
      - "traefik.http.services.${ROUTER_NAME}.loadbalancer.healthcheck.interval=10s"
      - "traefik.http.services.${ROUTER_NAME}.loadbalancer.healthcheck.timeout=5s"
    # Zero-downtime rollout: stop old container only after new one is healthy
    deploy:
      update_config:
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1

  mysql:
    container_name: mysql
    image: 'mysql:latest'
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      # Bind mount so data lives on the host (easy backups / inspectable)
      - './mysql/data:/var/lib/mysql'
    # Port intentionally NOT published: MySQL stays internal to the Docker
    # network and is only reachable by the websters container.
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - traefik

  redis:
    container_name: redis
    image: 'redis:7-alpine'
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes', '--requirepass', '${REDIS_PASSWORD}']
    volumes:
      - './redis/data:/data'
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - traefik

networks:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK}
