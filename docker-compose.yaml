services:
  websters:
    container_name: websters
    build:
      context: .
      target: production
    restart: always
    ports:
      - '42069:80'
    volumes:
      - './caddy/data:/data'
      - './caddy/config:/config'
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_HOST=mysql
      - DB_DATABASE=${MYSQL_DATABASE}
      - DB_USERNAME=${MYSQL_USER}
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_PORT=6379
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.redirect-to-main.redirectregex.regex=^https?://${SECONDARY_DOMAIN}/(.*)"
      - "traefik.http.middlewares.redirect-to-main.redirectregex.replacement=https://${DOMAIN}/$$1"
      - "traefik.http.middlewares.redirect-to-main.redirectregex.permanent=true"
      - "traefik.http.routers.${ROUTER_NAME}.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.${ROUTER_NAME}.entrypoints=https"
      - "traefik.http.routers.${ROUTER_NAME}.tls=true"
      - "traefik.http.routers.${ROUTER_NAME}.tls.certresolver=letsencrypt"
      - "traefik.http.routers.${ROUTER_NAME}-secondary.rule=Host(`${SECONDARY_DOMAIN}`)"
      - "traefik.http.routers.${ROUTER_NAME}-secondary.entrypoints=https"
      - "traefik.http.routers.${ROUTER_NAME}-secondary.tls=true"
      - "traefik.http.routers.${ROUTER_NAME}-secondary.tls.certresolver=letsencrypt"
      - "traefik.http.routers.${ROUTER_NAME}-secondary.middlewares=redirect-to-main"

  mysql:
    container_name: mysql
    image: 'mysql:latest'
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - 'mysql_data:/var/lib/mysql'
    # Port intentionally NOT published: MySQL stays internal to the Docker
    # network and is only reachable by the websters container.
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - traefik

  redis:
    container_name: redis
    image: 'redis:7-alpine'
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes', '--requirepass', '${REDIS_PASSWORD}']
    volumes:
      - 'redis_data:/data'
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - traefik

# mysql_data / redis_data remain named volumes (production best-practice:
# better performance + correct ownership for the DB/redis internal users).
# Caddy TLS data is a bind mount so certs survive rebuilds on the host.
volumes:
  mysql_data: null
  redis_data: null
  sail-mysql:
    driver: local

networks:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK}
